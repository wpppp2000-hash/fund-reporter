name: Daily Fund Analysis

on:
  schedule:
    - cron: '30 6 * * *'   # UTC 06:30 = 北京时间 14:30
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests akshare   # ← 修正：akshare（少了一个 k）

      - name: Run fund analysis
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}   # ← 修正：用 ${{ }} 格式
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}       # ← 修正
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}       # ← 修正
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}       # ← 修正
        run: python fund_analysis.py
